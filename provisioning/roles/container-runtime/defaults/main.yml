---
# User that owns the rootless container stack.
vm_user: student

# Podman + compose-go (docker-compose-v2). `podman compose` auto-discovers the
# docker-compose-v2 cli-plugin; this is the compose-go binary we want, NOT the
# python podman-compose (collapses every service into one pod, breaks Traefik's
# per-hostname routing).
container_runtime_packages:
  - podman
  - docker-compose-v2

# Let rootless containers publish 80/443 without root (Traefik binds both).
container_unprivileged_port_start: 80
