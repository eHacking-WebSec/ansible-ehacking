---
# Deploy the eHacking offline stack onto a host that already has rootless Podman
# (see the container-runtime role): clone the local-docker-setup, bring it up via
# a systemd --user unit (so it also autostarts on login), and trust the step-ca
# root system-wide + in Firefox/Chromium.

- name: Resolve clone dir (defaults to <home>/.hidden)
  ansible.builtin.set_fact:
    ehacking_dir: "{{ ehacking_dir or (vm_user_home ~ '/.hidden') }}"
  tags: ehacking-deploy

- name: Clone the eHacking local-docker-setup
  become: true
  become_user: "{{ vm_user }}"
  ansible.builtin.git:
    repo: "{{ ehacking_repo }}"
    dest: "{{ ehacking_dir }}"
    version: "{{ ehacking_version }}"
    single_branch: true
  when: ehacking_repo | length > 0
  tags: ehacking-deploy

- name: Map eHacking hostnames to 127.0.0.1 in /etc/hosts
  ansible.builtin.blockinfile:
    path: /etc/hosts
    marker: "# {mark} ANSIBLE MANAGED — eHacking hosts"
    block: |
      {% for h in ehacking_hosts %}
      127.0.0.1 {{ h }}
      {% endfor %}
  tags: ehacking-deploy

- name: Pull images (online provisioning only)
  become: true
  become_user: "{{ vm_user }}"
  ansible.builtin.command:
    cmd: ./bin/compose pull
    chdir: "{{ ehacking_dir }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ vm_user_uid }}"
  changed_when: true
  when: ehacking_pull_images | bool
  tags: ehacking-deploy

# --- Autostart via a systemd --user unit -----------------------------------
# `just` drives the stack manually; the unit brings it up now and on every login.
- name: Install just (compose shortcuts + autostart helper)
  ansible.builtin.apt:
    name: just
    state: present
  tags: ehacking-deploy

- name: Ensure the user's systemd unit directory exists
  become: true
  become_user: "{{ vm_user }}"
  ansible.builtin.file:
    path: "{{ vm_user_home }}/.config/systemd/user"
    state: directory
    mode: "0755"
  tags: ehacking-deploy

- name: Install the ehacking.service user unit
  become: true
  become_user: "{{ vm_user }}"
  ansible.builtin.template:
    src: ehacking.service.j2
    dest: "{{ vm_user_home }}/.config/systemd/user/ehacking.service"
    mode: "0644"
  tags: ehacking-deploy

# enable --now brings the stack up AND wires autostart in one step (oneshot +
# RemainAfterExit), replacing an explicit ./start.sh call.
- name: Enable + start ehacking.service (brings the stack up, autostarts on login)
  become: true
  become_user: "{{ vm_user }}"
  ansible.builtin.systemd_service:
    name: ehacking.service
    enabled: true
    state: started
    scope: user
    daemon_reload: true
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ vm_user_uid }}"
  tags: ehacking-deploy

# --- Trust the step-ca root -------------------------------------------------
# ca-server (nginx sidecar) publishes the root over plain HTTP; poll until it
# answers, then install — runtime-agnostic, no `docker exec`.
- name: Wait for the step-ca root to be served
  ansible.builtin.uri:
    url: "{{ ehacking_ca_url }}"
    return_content: true
  register: ehacking_ca_probe
  until: ehacking_ca_probe.status == 200
  retries: 30
  delay: 5
  tags: ehacking-deploy

- name: Install the step-ca root into the system trust store
  ansible.builtin.copy:
    content: "{{ ehacking_ca_probe.content }}"
    dest: /usr/local/share/ca-certificates/ehacking-ca.crt
    owner: root
    group: root
    mode: "0644"
  tags: ehacking-deploy

# Direct command, not a notify-handler: the copy above is idempotent (reports
# "ok" on re-run), so a handler would never fire and the root would stay
# installed-but-not-activated. update-ca-certificates is itself idempotent — it
# always prints "N added, M removed", so only report changed when N/M are non-zero.
- name: Refresh the system trust store
  ansible.builtin.command: update-ca-certificates
  register: ehacking_update_ca
  changed_when: ehacking_update_ca.stdout is not search('0 added, 0 removed')
  tags: ehacking-deploy

- name: Also drop the root in the user's Downloads (handy reference)
  become: true
  become_user: "{{ vm_user }}"
  ansible.builtin.copy:
    content: "{{ ehacking_ca_probe.content }}"
    dest: "{{ vm_user_home }}/Downloads/ehacking-ca.crt"
    mode: "0644"
  tags: ehacking-deploy

# Firefox reads the OS trust store directly via ImportEnterpriseRoots — no
# per-profile certutil/NSS hack (the old "known bug"). Covers deb + snap.
- name: Ensure the Firefox managed-policy directory exists
  ansible.builtin.file:
    path: /etc/firefox/policies
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags: ehacking-deploy

- name: Trust the OS roots in Firefox via enterprise policy
  ansible.builtin.template:
    src: policies.json.j2
    dest: /etc/firefox/policies/policies.json
    owner: root
    group: root
    mode: "0644"
  tags: ehacking-deploy

# --- Chromium: per-user NSS DB ----------------------------------------------
# Chromium has no OS-store hook, so import every CA from the system dir (step-ca
# root + Burp's, both *.crt) into the user's NSS DB. certutil ships in
# libnss3-tools — install it here so the role is standalone.
- name: Ensure certutil is available (Chromium NSS)
  ansible.builtin.apt:
    name: libnss3-tools
    state: present
  tags: ehacking-deploy

- name: Ensure the user's NSS DB directory exists (Chromium)
  become: true
  become_user: "{{ vm_user }}"
  ansible.builtin.file:
    path: "{{ vm_user_home }}/.pki/nssdb"
    state: directory
    mode: "0700"
  tags: ehacking-deploy

- name: Initialise the user's NSS DB (Chromium)
  become: true
  become_user: "{{ vm_user }}"
  ansible.builtin.command:
    cmd: "certutil -d sql:{{ vm_user_home }}/.pki/nssdb -N --empty-password"
    creates: "{{ vm_user_home }}/.pki/nssdb/cert9.db"
  tags: ehacking-deploy

- name: Discover all system CAs to trust in Chromium
  ansible.builtin.find:
    paths: /usr/local/share/ca-certificates
    patterns: "*.crt"
  register: ehacking_system_cas
  tags: ehacking-deploy

# Idempotency by certificate, not nickname: NSS stores one entry per cert, so a
# per-nickname check would re-import (and report changed) every run if the same
# cert is already trusted under another name. Check the cert is present at all.
- name: Check which system CAs are already trusted in Chromium's NSS DB
  become: true
  become_user: "{{ vm_user }}"
  ansible.builtin.command:
    cmd: "certutil -d sql:{{ vm_user_home }}/.pki/nssdb -L -a -n {{ item.path | basename | regex_replace('\\.crt$', '') }}"
  loop: "{{ ehacking_system_cas.files }}"
  loop_control:
    label: "{{ item.path | basename }}"
  register: ehacking_nss_present
  changed_when: false
  failed_when: false
  tags: ehacking-deploy

# Import any CA whose nickname isn't yet in the DB. certutil -A dedupes by cert,
# so re-adding an already-trusted cert under the same nickname is a safe no-op.
- name: Import missing system CAs into Chromium's NSS DB
  become: true
  become_user: "{{ vm_user }}"
  ansible.builtin.command:
    cmd: "certutil -d sql:{{ vm_user_home }}/.pki/nssdb -A -t 'C,,' -n {{ item.item.path | basename | regex_replace('\\.crt$', '') }} -i {{ item.item.path }}"
  loop: "{{ ehacking_nss_present.results }}"
  loop_control:
    label: "{{ item.item.path | basename }}"
  when: item.rc != 0
  tags: ehacking-deploy
