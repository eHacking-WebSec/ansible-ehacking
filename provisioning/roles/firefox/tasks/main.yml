---
# Firefox is the snap package on Ubuntu 26.04 desktop. The eHacking CA is trusted
# via the enterprise-roots policy (OS trust store), installed by ehacking-deploy
# — no per-profile certutil/NSS import (the old "known bug").
- name: Set firefox_profile_directory
  ansible.builtin.set_fact:
    firefox_mozilla_directory: "{{ vm_user_home }}{{ '/snap/firefox/common' if snap_check.rc == 0 }}/.mozilla"
    firefox_profile_directory: "{{ vm_user_home }}{{ '/snap/firefox/common' if snap_check.rc == 0 }}/.mozilla/firefox/ehacking.default"
  when: firefox_profile_directory is undefined
  tags: firefox

- name: Install Firefox Snap
  snap:
    name:
      - firefox
  tags: firefox
  when: snap_check.rc == 0

- name: Install Firefox via apt
  apt:
    pkg: firefox
    state: latest
  tags: firefox
  when: snap_check.rc != 0

- name: Create directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ vm_user }}"
    group: "{{ vm_user_group }}"
    mode: '0755'
  loop:
    - "{{ firefox_mozilla_directory }}/certificates"
  tags: firefox

- name: Extract configuration
  ansible.builtin.unarchive:
    src: "{{ config_dir }}/firefox.tar.gz"
    dest: "{{ firefox_mozilla_directory }}/"
    remote_src: yes
    creates: "{{ firefox_profile_directory }}"
  tags: firefox

- name: Set owner
  ansible.builtin.file:
    path: "{{ firefox_mozilla_directory }}"
    owner: "{{ vm_user }}"
    group: "{{ vm_user_group }}"
    recurse: yes
  tags: firefox

- name: Create the Firefox certificate database if it does not exist
  ansible.builtin.command: >
    bash -c "certutil -N -d sql:{{ firefox_profile_directory }} -f /dev/null"
  args:
    creates: "{{ firefox_profile_directory }}/cert9.db"
  tags: firefox
