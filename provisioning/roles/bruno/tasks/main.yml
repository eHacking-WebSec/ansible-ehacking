- name: Install Bruno Snap
  snap:
    name:
      - bruno
  tags: bruno
  when: snap_check.rc == 0

# apt fallback only (snap is preferred). `apt_key` was removed on 26.04, so
# fetch the signing key into a keyring and reference it via signed-by.
- name: bruno - Fetch signing key into keyring
  ansible.builtin.command:
    cmd: gpg --batch --no-default-keyring --keyring /etc/apt/keyrings/bruno.gpg --keyserver keyserver.ubuntu.com --recv-keys 9FA6017ECABE0266
    creates: /etc/apt/keyrings/bruno.gpg
  tags: bruno
  when: snap_check.rc != 0

- name: bruno - Add apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/bruno.gpg] http://debian.usebruno.com/ bruno stable"
    state: present
    filename: bruno
  tags: bruno
  when: snap_check.rc != 0


- name: bruno - Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 86400  # One day in seconds
  tags: bruno
  when: snap_check.rc != 0

- name: bruno - Install 
  apt:
    pkg:
      - bruno
    state: latest
  tags: bruno
  when: snap_check.rc != 0