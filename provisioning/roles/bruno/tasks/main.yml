---
# Bruno publishes no arm64 apt repo and its snap is amd64-only, so install the
# native .deb straight from GitHub releases — one path for every arch. Revisit
# (back to an apt repo) once usebruno ships an arm64 one.
- name: bruno - Map host arch to the release asset token
  ansible.builtin.set_fact:
    bruno_arch: "{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}"
  tags: bruno

- name: bruno - Look up the latest GitHub release
  ansible.builtin.uri:
    url: https://api.github.com/repos/usebruno/bruno/releases/latest
  register: bruno_release
  changed_when: false
  tags: bruno

- name: bruno - Select the .deb asset for this arch
  ansible.builtin.set_fact:
    bruno_deb: "{{ bruno_release.json.assets | selectattr('name', 'search', '_' ~ bruno_arch ~ '_linux\\.deb$') | first }}"
  tags: bruno

- name: bruno - Download the .deb
  ansible.builtin.get_url:
    url: "{{ bruno_deb.browser_download_url }}"
    dest: "/tmp/{{ bruno_deb.name }}"
    mode: '0644'
  tags: bruno

- name: bruno - Install (apt resolves the dependencies)
  ansible.builtin.apt:
    deb: "/tmp/{{ bruno_deb.name }}"
    state: present
  tags: bruno
