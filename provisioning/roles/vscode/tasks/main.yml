---
# `apt-key` was removed in Ubuntu 24.04+/26.04, so the old ansible.builtin.apt_key
# fails ("Failed to find required executable apt-key"). Use the modern
# signed-by keyring approach instead.
- name: VSCode - Ensure apt keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  tags: vscode

- name: VSCode - Add Microsoft signing key
  ansible.builtin.get_url:
    url: https://packages.microsoft.com/keys/microsoft.asc
    dest: /etc/apt/keyrings/microsoft.asc
    mode: '0644'
  tags: vscode

- name: VSCode - Add apt repository (signed-by)
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }} signed-by=/etc/apt/keyrings/microsoft.asc] https://packages.microsoft.com/repos/code stable main"
    filename: vscode
    state: present
  tags: vscode


- name: VSCode - Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 86400  # One day in seconds
  tags: vscode

- name: VSCode - Install 
  apt:
    pkg:
      - apt-transport-https # required for code
      - code
    state: latest
  tags: vscode

- name: VScode - Install Plugins
  become: yes
  become_user: "{{ vm_user }}"
  ansible.builtin.command:
    cmd: >
      code --install-extension VASubasRaj.flashpost
      code --install-extension 42Crunch.vscode-openapi
      code --install-extension petli-full.jq-vscode
    creates: "{{ vm_user_home }}/.vscode/extensions/extensions.json"
  tags: vscode