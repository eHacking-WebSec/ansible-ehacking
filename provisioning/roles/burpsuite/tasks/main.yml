---
- name: Set burpsuite version (leave empty for latest version)
  ansible.builtin.set_fact:
    version: "" # latest (override e.g. "&version=2025.1.4" to pin)
  tags: burpsuite

- name: Install package dependencies
  apt:
    pkg:
      - default-jre
      - libfontconfig1
      - libfreetype6
      - python3-defusedxml
      - python3-pexpect
    state: present
  tags: burpsuite

- name: Check whether Burp is already installed
  ansible.builtin.stat:
    path: /usr/local/BurpSuiteCommunity
  register: burp_installed
  tags: burpsuite

- name: Download installer (x86_64)
  ansible.builtin.get_url:
    url: "https://portswigger.net/burp/releases/download?product=community{{ version }}&type=linux"
    dest: "/tmp/burp.sh"
    mode: '0640'
  when:
    - ansible_facts.architecture == "x86_64"
    - not burp_installed.stat.exists
  tags: burpsuite

- name: Download installer (aarch64)
  ansible.builtin.get_url:
    url: "https://portswigger.net/burp/releases/download?product=community{{ version }}&type=linuxArm64"
    dest: "/tmp/burp.sh"
    mode: '0640'
  when:
    - ansible_facts.architecture == "aarch64"
    - not burp_installed.stat.exists
  tags: burpsuite

- name: Install
  ansible.builtin.command:
    cmd: "/bin/sh /tmp/burp.sh -q -varfile '{{ config_dir }}/burpsuite_response.varfile' -overwrite"
    chdir: /tmp
    creates: "/usr/local/BurpSuiteCommunity"
  tags: burpsuite

- name: Set JAR path as a fact
  set_fact:
    burpsuite_jar: "/usr/local/BurpSuiteCommunity/burpsuite_community.jar"
  tags: burpsuite

- name: Copy configuration to {{ vm_user_home }}
  ansible.builtin.copy:
    src: "{{ config_dir }}/.BurpSuite"
    remote_src: yes
    dest: '{{ vm_user_home }}/'
    owner: "{{ vm_user }}"
    group: "{{ vm_user_group }}"
    mode: '0755'
  tags: burpsuite

- name: Copy further configuration in .BurpSuite from template
  ansible.builtin.template:
    src: "{{ item }}"
    remote_src: yes
    dest: "{{ vm_user_home }}/.BurpSuite/{{ item | basename | regex_replace('\\.j2$', '') }}"
    owner: "{{ vm_user }}"
    group: "{{ vm_user_group }}"
    mode: '0755'
  loop: "{{ query('fileglob', config_dir ~ '/templates/.BurpSuite/*.j2') }}"
  tags: burpsuite

- name: Configure and Accept Terms
  become: yes
  become_user: "{{ vm_user }}"
  ansible.builtin.command:
    cmd: |
      python3 {{ vm_user_home }}/.BurpSuite/burp-accept-terms-and-conditions-and-download-ca-cert.py
    creates: "{{ vm_user_home }}/Downloads/Burpsuite-CA-certificate.pem"
  tags: burpsuite

- name: Find the Burp installer + temp project dirs left in /tmp
  ansible.builtin.find:
    paths: /tmp
    patterns: ['burp*.tmp', 'burp.sh']
    file_type: any  # the temp projects are directories — the default 'file' misses them
  register: burp_leftovers
  tags: burpsuite

- name: Clean them up
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ burp_leftovers.files }}"
  loop_control:
    label: "{{ item.path }}"
  tags: burpsuite

# Drop Burp's CA into the OS trust store. Must be a *.crt file: update-ca-certificates
# only reads .crt, and ehacking-deploy globs that same dir to trust every CA (the
# eHacking CA root + Burp) in Chromium (CACertificates policy) and Firefox (profile
# NSS DB). The copy notifies update-ca-certificates to refresh the OS store.
- name: Copy Burp's CA into the system trust store (as .crt)
  ansible.builtin.copy:
    src: "{{ vm_user_home }}/Downloads/Burpsuite-CA-certificate.pem"
    remote_src: yes
    dest: /usr/local/share/ca-certificates/burpsuite-ca.crt
    owner: root
    group: root
    mode: '0644'
  notify:
    - update CA certificates
  tags: burpsuite
