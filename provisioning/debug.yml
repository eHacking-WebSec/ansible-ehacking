---
- name: Gather and print system facts
  hosts: localhost
  gather_facts: yes
  tasks:
    # - name: Print all available facts
    #   ansible.builtin.debug:
    #     var: ansible_facts

    - name: Print the OS details
      ansible.builtin.debug:
        msg: "os_family: '{{ ansible_facts.os_family }}', distribution: '{{ ansible_facts.distribution }}', distribution_version: '{{ ansible_facts.distribution_version }}'"

    - name: Distinguish between Debian and Ubuntu
      ansible.builtin.debug:
        msg: "This is Ubuntu"
      when: ansible_facts.distribution == "Ubuntu"

    - name: Distinguish between Debian and Ubuntu
      ansible.builtin.debug:
        msg: "This is Debian"
      when: ansible_facts.distribution == "Debian"